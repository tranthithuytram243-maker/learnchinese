<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Phát Âm Tiếng Trung</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        #word { font-size: 72px; color: #2c3e50; margin: 20px 0; }
        #pinyin { font-size: 24px; color: #7f8c8d; margin-bottom: 20px; }
        #status { font-weight: bold; margin: 20px; height: 24px; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background-color: #27ae60; color: white; transition: 0.3s; }
        button:hover { background-color: #2ecc71; }
        button:disabled { background-color: #bdc3c7; }
        .score-info { margin-top: 20px; font-size: 14px; color: #34495e; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Phát âm từ này:</h2>
        <div id="word">你好</div>
        <div id="pinyin">nǐ hǎo</div>
        
        <button id="start-btn">Bắt đầu nói</button>
        <div id="status">Nhấn nút để bắt đầu</div>
        
        <div class="score-info">
            Độ chính xác hiện tại: <span id="confidence">0</span>%
        </div>
    </div>

    <script>
        const wordList = [
            { text: '你好', pinyin: 'nǐ hǎo' },
            { text: '谢谢', pinyin: 'xiè xiè' },
            { text: '中国', pinyin: 'zhōng guó' },
            { text: '学习', pinyin: 'xué xí' },
            { text: '北京', pinyin: 'běi jīng' }
        ];

        let currentIndex = 0;

        // Khởi tạo Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Hãy dùng Chrome hoặc Edge.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN'; // Thiết lập nhận diện tiếng Trung
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const startBtn = document.getElementById('start-btn');
        const wordDisplay = document.getElementById('word');
        const pinyinDisplay = document.getElementById('pinyin');
        const statusDisplay = document.getElementById('status');
        const confidenceDisplay = document.getElementById('confidence');

        startBtn.onclick = () => {
            recognition.start();
            statusDisplay.innerText = "Đang nghe...";
            statusDisplay.style.color = "#e67e22";
            startBtn.disabled = true;
        };

        recognition.onresult = (event) => {
            const result = event.results[0][0].transcript;
            const confidence = event.results[0][0].confidence * 100;
            const targetWord = wordList[currentIndex].text;

            confidenceDisplay.innerText = confidence.toFixed(2);

            // Logic kiểm tra: Đúng từ và độ chính xác > 90%
            if (result === targetWord && confidence > 90) {
                statusDisplay.innerText = `Chính xác! (${result})`;
                statusDisplay.style.color = "#27ae60";
                
                // Tự động chuyển từ sau 1.5 giây
                setTimeout(nextWord, 1500);
            } else if (result === targetWord) {
                statusDisplay.innerText = `Phát âm đúng nhưng chưa rõ (Độ tin cậy: ${confidence.toFixed(0)}%)`;
                statusDisplay.style.color = "#f1c40f";
            } else {
                statusDisplay.innerText = `Bạn nói: "${result}" - Thử lại nhé!`;
                statusDisplay.style.color = "#c0392b";
            }
        };

        recognition.onspeechend = () => {
            recognition.stop();
            startBtn.disabled = false;
        };

        recognition.onerror = (event) => {
            statusDisplay.innerText = "Lỗi nhận diện: " + event.error;
            startBtn.disabled = false;
        };

        function nextWord() {
            currentIndex++;
            if (currentIndex < wordList.length) {
                wordDisplay.innerText = wordList[currentIndex].text;
                pinyinDisplay.innerText = wordList[currentIndex].pinyin;
                statusDisplay.innerText = "Tiếp tục nào!";
                statusDisplay.style.color = "#2c3e50";
                confidenceDisplay.innerText = "0";
            } else {
                wordDisplay.innerText = "🎉 Hoàn thành!";
                pinyinDisplay.innerText = "";
                startBtn.style.display = "none";
                statusDisplay.innerText = "Bạn đã hoàn thành danh sách!";
            }
        }
    </script>
</body>
</html>
